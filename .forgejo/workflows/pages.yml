name: Deploy Codeberg Pages

# Builds the libxtc documentation site with Doxygen and deploys it
# to Codeberg Pages, which is the canonical home for the rendered
# docs.  GitHub is a validate-only mirror (.github/workflows/pages.yml).

on:
  push:
    branches: [main]
    paths:
      - 'src/inc/**'
      - 'docs/**'
      - 'README.md'
      - '.forgejo/workflows/pages.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: codeberg-small
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen

      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v4

      - name: Generate Doxygen docs
        working-directory: docs
        run: doxygen Doxyfile 2>../doxygen-warnings.txt

      - name: Report doxygen warning count
        # Surface the count without failing on the existing
        # undocumented-symbol backlog.  Flip Doxyfile WARN_AS_ERROR
        # to YES once the public headers carry full doc comments.
        run: |
          count=$(wc -l < doxygen-warnings.txt)
          echo "Doxygen produced ${count} warning lines"
          if [ "${count}" -gt 0 ]; then
            echo "First 20:"
            head -20 doxygen-warnings.txt
          fi

      - name: Stage site directory
        run: |
          mkdir -p _site
          cp -r docs/api/html/* _site/

      - name: Deploy to Codeberg Pages
        uses: https://codeberg.org/git-pages/action@v2
        with:
          site: 'https://${{ forge.repository_owner }}.codeberg.page/libxtc/'
          token: ${{ forge.token }}
          source: _site/
