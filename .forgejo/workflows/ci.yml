name: CI

# Build libxtc and run the full test suite (make check: munit + PBT +
# shell tests) on every push and pull request.  This is the workflow
# that backs the README's "CI-tested every commit" statement; until
# it existed that claim was aspirational.
#
# The autotools path is the canonical build; meson is a secondary
# stub and is not exercised here.  hegel-c property tests need a local
# hegel server and are configured out in CI (the PBT sources still
# compile; the generative runs are a developer-local step).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: codeberg-medium
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ${{ matrix.compiler }} make autoconf automake \
            pkg-config libssl-dev liburing-dev gawk

      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v4

      - name: Autoreconf
        working-directory: dist
        run: autoreconf -i

      - name: Configure
        run: |
          mkdir -p build_ci
          cd build_ci
          CC=${{ matrix.compiler }} ../dist/configure --with-tls=auto

      - name: Build
        run: make -C build_ci -j"$(nproc)"

      - name: Test
        run: make -C build_ci check

  coro-fctx:
    # Force the fcontext coroutine substrate (the musl path) on a
    # glibc runner so it is exercised on every commit without needing
    # a musl toolchain.
    runs-on: codeberg-medium
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make autoconf pkg-config libssl-dev liburing-dev gawk
      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v4
      - name: Autoreconf
        working-directory: dist
        run: autoreconf -i
      - name: Configure (force fcontext)
        run: |
          mkdir -p build_fctx
          cd build_fctx
          CPPFLAGS=-DXTC_CORO_FORCE_FCTX ../dist/configure --with-tls=auto
      - name: Build
        run: make -C build_fctx -j"$(nproc)"
      - name: Test
        run: make -C build_fctx check

  sanitizers:
    runs-on: codeberg-medium
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, undefined]
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc make autoconf pkg-config libssl-dev liburing-dev gawk

      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v4

      - name: Autoreconf
        working-directory: dist
        run: autoreconf -i

      - name: Configure with ${{ matrix.sanitizer }} sanitizer
        run: |
          mkdir -p build_san
          cd build_san
          CFLAGS="-fsanitize=${{ matrix.sanitizer }} -fno-omit-frame-pointer -g -O1" \
          LDFLAGS="-fsanitize=${{ matrix.sanitizer }}" \
            ../dist/configure --with-tls=auto

      - name: Build
        run: make -C build_san -j"$(nproc)"

      - name: Test under sanitizer
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1:strict_string_checks=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: make -C build_san check

  examples:
    # Build the examples and run their in-process tests (no daemons,
    # so nothing hangs CI).  The examples exercise the public API
    # broadly -- including the single-file amalgamation drop-in -- and
    # would otherwise rot unnoticed since the library make check does
    # not build them.
    runs-on: codeberg-medium
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc make autoconf pkg-config libssl-dev liburing-dev gawk python3
      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v4
      - name: Autoreconf
        working-directory: dist
        run: autoreconf -i
      - name: Build libxtc
        run: |
          mkdir -p build_ci
          cd build_ci
          ../dist/configure --with-tls=auto
          make -j"$(nproc)"
      - name: kaka in-process tests
        working-directory: examples/07_kaka
        run: |
          make XTC_BUILD=../../build_ci
          ./test_frame
          ./test_partition
          ./test_broker
          ./test_group
      - name: sqlxtc in-process tests + amalgamation
        working-directory: examples/06_sqlxtc
        run: |
          make XTC_BUILD=../../build_ci test-quack test-vfs test-pcache test-concurrency
          make XTC_BUILD=../../build_ci amalg
          make XTC_BUILD=../../build_ci test-vfs-amalg test-pcache-amalg
