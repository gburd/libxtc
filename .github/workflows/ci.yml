name: CI

# Mirror of the Codeberg CI for the GitHub mirror.  Builds libxtc and
# runs the full test suite across gcc + clang plus ASan/UBSan.  See
# .forgejo/workflows/ci.yml for the canonical version and the notes
# on why autotools (not meson) is the path under test.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ${{ matrix.compiler }} make autoconf automake \
            pkg-config libssl-dev liburing-dev gawk

      - name: Autoreconf
        working-directory: dist
        run: autoreconf -i

      - name: Configure
        run: |
          mkdir -p build_ci
          cd build_ci
          CC=${{ matrix.compiler }} ../dist/configure --with-tls=auto

      - name: Build
        run: make -C build_ci -j"$(nproc)"

      - name: Test
        run: make -C build_ci check

  coro-fctx:
    # Force the fcontext coroutine substrate (the musl path) on a
    # glibc runner so it is exercised every commit without a musl
    # toolchain.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make autoconf pkg-config libssl-dev liburing-dev gawk
      - name: Autoreconf
        working-directory: dist
        run: autoreconf -i
      - name: Configure (force fcontext)
        run: |
          mkdir -p build_fctx
          cd build_fctx
          CPPFLAGS=-DXTC_CORO_FORCE_FCTX ../dist/configure --with-tls=auto
      - name: Build
        run: make -C build_fctx -j"$(nproc)"
      - name: Test
        run: make -C build_fctx check

  sanitizers:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, undefined]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc make autoconf pkg-config libssl-dev liburing-dev gawk

      - name: Autoreconf
        working-directory: dist
        run: autoreconf -i

      - name: Configure with ${{ matrix.sanitizer }} sanitizer
        run: |
          mkdir -p build_san
          cd build_san
          CFLAGS="-fsanitize=${{ matrix.sanitizer }} -fno-omit-frame-pointer -g -O1" \
          LDFLAGS="-fsanitize=${{ matrix.sanitizer }}" \
            ../dist/configure --with-tls=auto

      - name: Build
        run: make -C build_san -j"$(nproc)"

      - name: Test under sanitizer
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1:strict_string_checks=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: make -C build_san check

  examples:
    # Build the examples and run their in-process tests (no daemons,
    # so nothing hangs CI).  The examples exercise the public API
    # broadly -- including the single-file amalgamation drop-in -- and
    # would otherwise rot unnoticed since the library make check does
    # not build them.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc make autoconf pkg-config libssl-dev liburing-dev gawk python3
      - name: Autoreconf
        working-directory: dist
        run: autoreconf -i
      - name: Build libxtc
        run: |
          mkdir -p build_ci
          cd build_ci
          ../dist/configure --with-tls=auto
          make -j"$(nproc)"
      - name: kaka in-process tests
        working-directory: examples/07_kaka
        run: |
          make XTC_BUILD=../../build_ci
          ./test_frame
          ./test_partition
          ./test_broker
          ./test_group
      - name: sqlxtc in-process tests + amalgamation
        working-directory: examples/06_sqlxtc
        run: |
          make XTC_BUILD=../../build_ci test-quack test-vfs test-vfs-loop test-pcache test-concurrency test-parallel test-bufmgr test-bufmgr-mt test-btnode test-btree test-btree-loop
          make XTC_BUILD=../../build_ci amalg
          make XTC_BUILD=../../build_ci test-vfs-amalg test-pcache-amalg

  macos:
    # macOS runtime coverage: kqueue I/O backend + ucontext coroutine
    # substrate (the x86-64 fcontext .S files self-gate to empty on
    # macOS / Apple Silicon).  Runs the C (munit) suite; the shell
    # tests are GNU-tooling-sensitive and are covered on Linux.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: brew install autoconf automake pkg-config gawk openssl@3
      - name: Autoreconf
        working-directory: dist
        run: autoreconf -i
      - name: Configure
        run: |
          mkdir -p build_ci && cd build_ci
          PKG_CONFIG_PATH="$(brew --prefix openssl@3)/lib/pkgconfig" \
            ../dist/configure --with-tls=auto
      - name: Build
        run: make -C build_ci -j3
      - name: Test (C / munit suite)
        run: make -C build_ci tests-c

  windows-msvc:
    # Windows / MSVC: builds xtc.lib from src (cl + ml64 for the
    # MASM fcontext port) and runs the smoke test.  The full munit
    # harness uses GCC-isms cl rejects, so the smoke test stands in
    # (see dist/build_msvc.bat / test/msvc/smoke.c).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up MSVC (cl, ml64, lib on PATH)
        uses: ilammy/msvc-dev-cmd@v1
      - name: Build xtc.lib + smoke, run smoke
        shell: cmd
        run: |
          set XTC_SRC=%CD%
          call dist\build_msvc.bat
